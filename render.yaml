services:
  - type: web
    name: kapitalplattformen-demo
    runtime: node
    plan: free
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEMO_EMAIL
        sync: false
      - key: DEMO_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: admin@kapitalplattformen.com
      - key: BREVO_SENDER_NAME
        value: Kapitalplattformen
