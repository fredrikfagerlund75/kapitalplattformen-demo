services:
  - type: web
    name: kapitalplattformen-demo
    runtime: node
    plan: free
    buildCommand: "cd 'Prospektus-generator/Version 5/kapitalplattformen-v5/frontend' && npm install && npm run build && cd '../backend' && npm install"
    startCommand: "cd 'Prospektus-generator/Version 5/kapitalplattformen-v5/backend' && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DEMO_EMAIL
        sync: false
      - key: DEMO_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: admin@kapitalplattformen.com
      - key: BREVO_SENDER_NAME
        value: Kapitalplattformen
