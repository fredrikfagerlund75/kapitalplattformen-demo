services:
  - type: web
    name: kapitalplattformen-v5
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        value: info@kapitalplattformen.se
      - key: BREVO_SENDER_NAME
        value: Kapitalplattformen
      - key: DEMO_EMAIL
        value: demo@kapital.se
      - key: DEMO_PASSWORD
        value: Demo2026!
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
